<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>事故情報スライドショー v0.1</title>
<style>
  /* ========================================
     事故情報スライドショー v0.1
     - タブレット横のPCでブラウザで開く用
     - PDFをiframeで全画面表示して秒数で自動切替
     ======================================== */

  /* 全体リセット */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

  /* スライド本体（PDFを表示する枠） */
  #slide {
    width: 100vw;
    height: 100vh;
    border: none;
    background: #fff;
  }

  /* 画面下の操作バー（最初は隠れてて、マウスを下に動かすと出てくる） */
  #controls {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px 24px;
    background: rgba(0, 0, 0, 0.75);
    color: #fff;
    font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 16px;
    transform: translateY(100%);
    transition: transform 0.3s;
    z-index: 10;
  }
  #controls.show { transform: translateY(0); }

  /* マウスを画面下に寄せた時に操作バーを出すためのホバー領域 */
  #hover-zone {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 60px;
    z-index: 5;
  }

  #controls button {
    background: #fff;
    color: #000;
    border: none;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
  }
  #controls button:hover { background: #ddd; }

  #status { flex: 1; }

  /* 左上の件数表示 */
  #counter {
    position: fixed;
    top: 16px;
    left: 16px;
    background: rgba(0, 0, 0, 0.6);
    color: #fff;
    padding: 6px 12px;
    border-radius: 4px;
    font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
    font-size: 13px;
    z-index: 10;
  }
</style>
</head>
<body>

<!-- PDFを表示する枠 -->
<iframe id="slide" src=""></iframe>

<!-- 左上のカウンター -->
<div id="counter">1 / 11</div>

<!-- 画面下のマウスホバー検知領域 -->
<div id="hover-zone"></div>

<!-- 操作バー -->
<div id="controls">
  <button onclick="prev()">◀ 前へ</button>
  <button onclick="togglePause()" id="pauseBtn">⏸ 停止</button>
  <button onclick="next()">次へ ▶</button>
  <span id="status"></span>
  <label>
    秒数:
    <input type="number" id="interval" value="30" min="5" max="300" style="width: 60px;">
  </label>
</div>

<script>
/* ========================================
   設定：スライドに流すPDFのリスト
   新しく追加したい時はこの配列に追記するだけ。
   pdfsフォルダに同じ名前でPDFを置いてください。
   ======================================== */
const slides = [
  "pdfs/S20260303-01_立防下部の笹竹伐採の際に手鎌で指を切る⇒軽傷.pdf",
  "pdfs/S20260303-02_作業後の片付け時に伸縮はしごに指を挟む⇒重傷.pdf",
  "pdfs/S20260318-01_走行車線規制内の空ペール缶が追越車線に転がり一般車に接触⇒物損.pdf",
  "pdfs/S20260318-02_シールド工事で作業床へ梯子から乗り移る際に梯子の固定が外れ落下⇒打撲(軽傷).pdf",
  "pdfs/S20260318-03_ヤード内で側溝を上下反転させる際に親指を挟む⇒裂傷・骨折(重傷).pdf",
  "pdfs/S20260331-01_シールドマシン工事で敷鉄板を荷降ろし時に誤って右手薬指を挟む⇒重傷.pdf",
  "pdfs/S20260331-02_湿塩散布車点検中にステップ3段目から転落し左足首負傷⇒重傷.pdf",
  "pdfs/S20260331-03_橋脚内部でプラ船容器を吊上げる際に容器が落下し作業員の顔に接触⇒軽傷.pdf",
  "pdfs/S20260408_トールゲート基礎新設のため掘削時に管理図に無い給水を破損⇒料金所断水.pdf"
];

/* 状態管理 */
let currentIndex = 0;
let isPaused = false;
let timer = null;

/* PDF表示を切り替える */
function showSlide(index) {
  currentIndex = ((index % slides.length) + slides.length) % slides.length;
  // PDFビューアの初期表示を「幅に合わせる」にする（#view=FitH）
  document.getElementById('slide').src = slides[currentIndex] + "#view=FitH&toolbar=0&navpanes=0";
  document.getElementById('counter').textContent = (currentIndex + 1) + " / " + slides.length;
  document.getElementById('status').textContent = decodeURIComponent(slides[currentIndex].split('/').pop());
}

/* 次へ・前へ */
function next() { showSlide(currentIndex + 1); resetTimer(); }
function prev() { showSlide(currentIndex - 1); resetTimer(); }

/* 自動送りのタイマー */
function resetTimer() {
  if (timer) clearInterval(timer);
  if (isPaused) return;
  const sec = parseInt(document.getElementById('interval').value) || 5;
  timer = setInterval(() => next(), sec * 1000);
}

/* 一時停止トグル */
function togglePause() {
  isPaused = !isPaused;
  document.getElementById('pauseBtn').textContent = isPaused ? "▶ 再生" : "⏸ 停止";
  resetTimer();
}

/* キーボード操作 */
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (e.key === ' ') { e.preventDefault(); togglePause(); }
});

/* マウスを画面下に持っていくと操作バーが出る */
document.getElementById('hover-zone').addEventListener('mouseenter', () => {
  document.getElementById('controls').classList.add('show');
});
document.getElementById('controls').addEventListener('mouseleave', () => {
  document.getElementById('controls').classList.remove('show');
});

/* 秒数変更時にタイマーをリセット */
document.getElementById('interval').addEventListener('change', resetTimer);

/* 起動 */
showSlide(0);
resetTimer();
</script>
</body>
</html>
