<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>事故情報スライドショー v0.1.2</title>
<style>
  /* ========================================
     事故情報スライドショー v0.1.2
     - デフォルト秒数5秒
     - PDFファイル名を短縮版（20260303-01.pdf 形式）に合わせて修正
     ======================================== */

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

  #slide {
    width: 100vw;
    height: 100vh;
    border: none;
    background: #fff;
  }

  #controls {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px 24px;
    background: rgba(0, 0, 0, 0.75);
    color: #fff;
    font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 16px;
    transform: translateY(100%);
    transition: transform 0.3s;
    z-index: 10;
  }
  #controls.show { transform: translateY(0); }

  #hover-zone {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 60px;
    z-index: 5;
  }

  #controls button {
    background: #fff;
    color: #000;
    border: none;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
  }
  #controls button:hover { background: #ddd; }

  #status { flex: 1; }

  #counter {
    position: fixed;
    top: 16px;
    left: 16px;
    background: rgba(0, 0, 0, 0.6);
    color: #fff;
    padding: 6px 12px;
    border-radius: 4px;
    font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
    font-size: 13px;
    z-index: 10;
  }
</style>
</head>
<body>

<iframe id="slide" src=""></iframe>

<div id="counter">1 / 1</div>

<div id="hover-zone"></div>

<div id="controls">
  <button onclick="prev()">◀ 前へ</button>
  <button onclick="togglePause()" id="pauseBtn">⏸ 停止</button>
  <button onclick="next()">次へ ▶</button>
  <span id="status"></span>
  <label>
    秒数（全スライド共通）:
    <input type="number" id="interval" value="5" min="1" max="300" style="width: 60px;">
  </label>
</div>

<script>
/* ========================================
   設定：スライドに流すPDFのリスト
   ファイル名はシンプルな「YYYYMMDD-NN.pdf」形式
   新しく追加したい時はこの配列に追記するだけ。
   ======================================== */
const slides = [
  "pdfs/20260303-01.pdf",
  "pdfs/20260303-02.pdf",
  "pdfs/20260318-01.pdf",
  "pdfs/20260318-02.pdf",
  "pdfs/20260318-03.pdf",
  "pdfs/20260331-01.pdf",
  "pdfs/20260331-02.pdf",
  "pdfs/20260331-03.pdf",
  "pdfs/20260408-01.pdf"
];

/* 状態管理 */
let currentIndex = 0;
let isPaused = false;
let timer = null;

/* PDF表示を切り替える */
function showSlide(index) {
  currentIndex = ((index % slides.length) + slides.length) % slides.length;
  document.getElementById('slide').src = slides[currentIndex] + "#view=FitH&toolbar=0&navpanes=0";
  document.getElementById('counter').textContent = (currentIndex + 1) + " / " + slides.length;
  document.getElementById('status').textContent = decodeURIComponent(slides[currentIndex].split('/').pop());
}

/* 次へ・前へ */
function next() { showSlide(currentIndex + 1); resetTimer(); }
function prev() { showSlide(currentIndex - 1); resetTimer(); }

/* 自動送りのタイマー（全スライド共通の秒数） */
function resetTimer() {
  if (timer) clearInterval(timer);
  if (isPaused) return;
  const sec = parseInt(document.getElementById('interval').value) || 5;
  timer = setInterval(() => next(), sec * 1000);
}

/* 一時停止トグル */
function togglePause() {
  isPaused = !isPaused;
  document.getElementById('pauseBtn').textContent = isPaused ? "▶ 再生" : "⏸ 停止";
  resetTimer();
}

/* キーボード操作 */
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (e.key === ' ') { e.preventDefault(); togglePause(); }
});

/* マウスを画面下に持っていくと操作バー表示 */
document.getElementById('hover-zone').addEventListener('mouseenter', () => {
  document.getElementById('controls').classList.add('show');
});
document.getElementById('controls').addEventListener('mouseleave', () => {
  document.getElementById('controls').classList.remove('show');
});

/* 秒数変更時にタイマーリセット（即時反映） */
document.getElementById('interval').addEventListener('change', resetTimer);
document.getElementById('interval').addEventListener('input', resetTimer);

/* 起動 */
showSlide(0);
resetTimer();
</script>
</body>
</html>
